# Cloudflare Tunnel configuration for Degens777Den
# cloutscape.org Unified Platform
#
# Tunnel name: degens777den-tunnel
# Credentials file is mounted at /etc/cloudflared/credentials.json inside the container.
# To generate credentials on the host, run:
#   cloudflared tunnel create degens777den-tunnel
#   cloudflared tunnel route dns degens777den-tunnel cloutscape.org
#   cloudflared tunnel route dns degens777den-tunnel api.cloutscape.org

tunnel: degens777den-tunnel
credentials-file: /etc/cloudflared/credentials.json

ingress:
  # Route the game engine REST API
  - hostname: api.cloutscape.org
    service: http://degens777den-engine:8080
    originRequest:
      # Forward real client IP via CF-Connecting-IP header
      noTLSVerify: false
      connectTimeout: 10s
      tcpKeepAlive: 30s
      keepAliveConnections: 100
      keepAliveTimeout: 90s
      httpHostHeader: api.cloutscape.org

  # Route the main site — the Go backend serves the web UI on port 8080
  - hostname: cloutscape.org
    service: http://degens777den-engine:8080
    originRequest:
      noTLSVerify: false
      connectTimeout: 10s
      tcpKeepAlive: 30s
      keepAliveConnections: 100
      keepAliveTimeout: 90s
      httpHostHeader: cloutscape.org

  # Default catch-all — return 404 for any unmatched hostname
  - service: http_status:404

# Logging (stdout only; file logging is not supported inside the cloudflared container)
loglevel: info
