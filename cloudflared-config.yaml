# Cloudflare Tunnel - Cloutscape / Degens Den
#
# Usage on the host:
#   cloudflared tunnel login
#   cloudflared tunnel create cloutscape
#   cloudflared tunnel route dns cloutscape cloutscape.org
#   cloudflared tunnel route dns cloutscape www.cloutscape.org
#   cloudflared tunnel route dns cloutscape api.cloutscape.org
#   cloudflared --config $(pwd)/cloudflared-config.yaml tunnel run cloutscape

tunnel: cloutscape
credentials-file: /etc/cloudflared/credentials.json

ingress:
  # Game engine REST + iframe UI
  - hostname: api.cloutscape.org
    service: http://localhost:8081
    originRequest:
      noTLSVerify: true
      connectTimeout: 10s
      keepAliveConnections: 100
      keepAliveTimeout: 90s

  # Main lobby (Kodakclout)
  - hostname: www.cloutscape.org
    service: http://localhost:8080
    originRequest:
      noTLSVerify: true
      connectTimeout: 10s
      keepAliveConnections: 100
      keepAliveTimeout: 90s

  - hostname: cloutscape.org
    service: http://localhost:8080
    originRequest:
      noTLSVerify: true
      connectTimeout: 10s
      keepAliveConnections: 100
      keepAliveTimeout: 90s

  - service: http_status:404

loglevel: info
