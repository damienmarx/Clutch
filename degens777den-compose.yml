# Degens777Den Unified Platform
# cloutscape.org Slots Engine + Cloudflare Tunnel

services:

  # The Clutch Slots Engine
  degens777den-engine:
    image: schwarzlichtbezirk/slotopol:latest
    container_name: degens777den-srv
    ports:
      - 8080:8080
    volumes:
      # Persistent local SQLite databases
      - ./degens777den-club.sqlite:/home/ubuntu/degens777den-club.sqlite
      - ./degens777den-spin.sqlite:/home/ubuntu/degens777den-spin.sqlite
      # Custom branding and configuration
      - ./degens777den.yaml:/home/ubuntu/slot-app.yaml
    environment:
      # Pass config file location to the app
      SLOTOPOL_CONFIG: /home/ubuntu/slot-app.yaml
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 15s
    # Health check to ensure the engine is responsive
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Cloudflare Tunnel for Secure Access
  cloudflared-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: degens777den-tunnel
    command: tunnel --config /etc/cloudflared/config.yaml run
    volumes:
      # Tunnel configuration and credentials
      - ./cloudflared-config.yaml:/etc/cloudflared/config.yaml
      - ./cloudflared-credentials.json:/etc/cloudflared/credentials.json
    depends_on:
      degens777den-engine:
        condition: service_healthy
    restart: unless-stopped
    # Health check for the tunnel
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: degens777den-net
