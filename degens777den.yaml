    - 188.114.96.0/20      # Cloudflare
    - 190.93.240.0/20      # Cloudflare
    - 197.234.240.0/22     # Cloudflare
    - 198.41.128.0/17      # Cloudflare
  port-http: ":8081"
  read-timeout: 30s
  read-header-timeout: 15s
  write-timeout: 30s
  idle-timeout: 60s
  max-header-bytes: 1048576
  shutdown-timeout: 15s

# Production Process Management:
# In a production environment, it is highly recommended to manage this process
# using a process manager like PM2 or systemd to ensure it restarts automatically
# on crashes or server reboots. The main Kodakclout deploy.sh script will handle this.

database:
  # Local SQLite database for unified platform
  driver-name: sqlite3
  use-spin-log: true
  club-source-name: degens777den-club.sqlite
  spin-source-name: degens777den-spin.sqlite
  sql-flush-tick: 1000ms
  club-update-buffer: 100
  club-insert-buffer: 100
  spin-insert-buffer: 200

gameplay:
  # Limits for Degens777Den
  adjunct-limit: 1000000
  min-jackpot: 5000
  max-spin-attempts: 500
